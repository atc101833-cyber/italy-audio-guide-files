<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 640 900"
     preserveAspectRatio="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3e8c5"/>
      <stop offset="0.5" stop-color="#dfcf9f"/>
      <stop offset="1" stop-color="#bda96f"/>
    </linearGradient>

    <g id="leaf">
      <ellipse cx="0" cy="0" rx="13" ry="6.2"
               fill="url(#gold)"
               stroke="#f3e8c5"
               stroke-width="1.2"/>
      <path d="M-9 0 H9"
            fill="none"
            stroke="#a99461"
            stroke-width="0.9"
            opacity="0.8"/>
    </g>
  </defs>

  <!-- 雙層細框 -->
  <rect x="10" y="10" width="620" height="880" rx="35"
        fill="none"
        stroke="#eadcaf"
        stroke-width="2.2"
        vector-effect="non-scaling-stroke"/>
  <rect x="15" y="15" width="610" height="870" rx="31"
        fill="none"
        stroke="#cdbb83"
        stroke-width="1"
        opacity="0.72"
        vector-effect="non-scaling-stroke"/>

  <!-- 上方中央 -->
  <g fill="none" stroke="#decf9e" stroke-width="2.2"
     stroke-linecap="round" vector-effect="non-scaling-stroke">
    <path d="M316 27 C278 32 245 27 208 18"/>
    <path d="M324 27 C362 32 395 27 432 18"/>
  </g>

  <g>
    <g transform="translate(294 29) rotate(-8)"><use href="#leaf"/></g>
    <g transform="translate(269 28) rotate(-16)"><use href="#leaf"/></g>
    <g transform="translate(244 24) rotate(-24)"><use href="#leaf"/></g>
    <g transform="translate(219 18) rotate(-31)"><use href="#leaf"/></g>

    <g transform="translate(346 29) rotate(8)"><use href="#leaf"/></g>
    <g transform="translate(371 28) rotate(16)"><use href="#leaf"/></g>
    <g transform="translate(396 24) rotate(24)"><use href="#leaf"/></g>
    <g transform="translate(421 18) rotate(31)"><use href="#leaf"/></g>
  </g>

  <!-- 左上角 -->
  <g fill="none" stroke="#decf9e" stroke-width="2.2"
     stroke-linecap="round" vector-effect="non-scaling-stroke">
    <path d="M27 135 C31 90 50 55 91 28"/>
  </g>
  <g>
    <g transform="translate(31 118) rotate(-74)"><use href="#leaf"/></g>
    <g transform="translate(37 94) rotate(-65)"><use href="#leaf"/></g>
    <g transform="translate(49 70) rotate(-51)"><use href="#leaf"/></g>
    <g transform="translate(65 49) rotate(-39)"><use href="#leaf"/></g>
    <g transform="translate(84 32) rotate(-27)"><use href="#leaf"/></g>
  </g>

  <!-- 右上角 -->
  <g transform="translate(640 0) scale(-1 1)">
    <g fill="none" stroke="#decf9e" stroke-width="2.2"
       stroke-linecap="round" vector-effect="non-scaling-stroke">
      <path d="M27 135 C31 90 50 55 91 28"/>
    </g>
    <g>
      <g transform="translate(31 118) rotate(-74)"><use href="#leaf"/></g>
      <g transform="translate(37 94) rotate(-65)"><use href="#leaf"/></g>
      <g transform="translate(49 70) rotate(-51)"><use href="#leaf"/></g>
      <g transform="translate(65 49) rotate(-39)"><use href="#leaf"/></g>
      <g transform="translate(84 32) rotate(-27)"><use href="#leaf"/></g>
    </g>
  </g>

  <!-- 左下角 -->
  <g transform="translate(0 900) scale(1 -1)">
    <g fill="none" stroke="#decf9e" stroke-width="2.2"
       stroke-linecap="round" vector-effect="non-scaling-stroke">
      <path d="M27 135 C31 90 50 55 91 28"/>
    </g>
    <g>
      <g transform="translate(31 118) rotate(-74)"><use href="#leaf"/></g>
      <g transform="translate(37 94) rotate(-65)"><use href="#leaf"/></g>
      <g transform="translate(49 70) rotate(-51)"><use href="#leaf"/></g>
      <g transform="translate(65 49) rotate(-39)"><use href="#leaf"/></g>
      <g transform="translate(84 32) rotate(-27)"><use href="#leaf"/></g>
    </g>
  </g>

  <!-- 右下角 -->
  <g transform="translate(640 900) scale(-1 -1)">
    <g fill="none" stroke="#decf9e" stroke-width="2.2"
       stroke-linecap="round" vector-effect="non-scaling-stroke">
      <path d="M27 135 C31 90 50 55 91 28"/>
    </g>
    <g>
      <g transform="translate(31 118) rotate(-74)"><use href="#leaf"/></g>
      <g transform="translate(37 94) rotate(-65)"><use href="#leaf"/></g>
      <g transform="translate(49 70) rotate(-51)"><use href="#leaf"/></g>
      <g transform="translate(65 49) rotate(-39)"><use href="#leaf"/></g>
      <g transform="translate(84 32) rotate(-27)"><use href="#leaf"/></g>
    </g>
  </g>

  <!-- 下方中央 -->
  <g transform="translate(0 900) scale(1 -1)">
    <g fill="none" stroke="#decf9e" stroke-width="2.2"
       stroke-linecap="round" vector-effect="non-scaling-stroke">
      <path d="M316 27 C278 32 245 27 208 18"/>
      <path d="M324 27 C362 32 395 27 432 18"/>
    </g>

    <g>
      <g transform="translate(294 29) rotate(-8)"><use href="#leaf"/></g>
      <g transform="translate(269 28) rotate(-16)"><use href="#leaf"/></g>
      <g transform="translate(244 24) rotate(-24)"><use href="#leaf"/></g>
      <g transform="translate(219 18) rotate(-31)"><use href="#leaf"/></g>

      <g transform="translate(346 29) rotate(8)"><use href="#leaf"/></g>
      <g transform="translate(371 28) rotate(16)"><use href="#leaf"/></g>
      <g transform="translate(396 24) rotate(24)"><use href="#leaf"/></g>
      <g transform="translate(421 18) rotate(31)"><use href="#leaf"/></g>
    </g>
  </g>
</svg>
